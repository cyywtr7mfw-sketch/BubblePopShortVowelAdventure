<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมกระดานตะลุยระบบหายใจ - สุขศึกษา ป.6</title>
    
    <!-- ดึงฟอนต์ไอติม (Itim) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Itim', cursive;
            background: linear-gradient(135deg, #ffdee9 0%, #b5fffc 100%);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #4a4a4a;
        }

        h2 { color: #ff6b81; margin-bottom: 5px; text-shadow: 1px 1px #fff; }

        /* ตัวกระดานเกม */
        .board {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-width: 500px;
            justify-content: center;
            margin: 15px 0;
        }

        /* ช่องแต่ละช่องบนกระดาน */
        .cell {
            width: 80px;
            height: 80px;
            background: white;
            border: 3px solid #ffb7b2;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .cell.active { border-color: #ff6b81; background: #ffe4e6; }

        /* ตัวเดินของผู้เล่น */
        .player {
            width: 24px;
            height: 24px;
            background: #ff4757;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            bottom: 5px;
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-5px); } }

        /* ปุ่มควบคุม */
        .btn {
            background: #ff6b81;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 20px;
            font-family: 'Itim', cursive;
            cursor: pointer;
            box-shadow: 0 4px 0 #e44d63;
            margin-bottom: 10px;
        }
        .btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

        /* กล่องคำถาม */
        .quiz-card {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #ffb7b2;
            border-radius: 20px;
            padding: 15px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            display: none;
        }

        .choice-btn {
            background: #e3fafc;
            border: 2px solid #99e9f2;
            padding: 10px;
            width: 100%;
            border-radius: 12px;
            margin: 5px 0;
            font-family: 'Itim', cursive;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
        }

        #result { margin-top: 10px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

    <h2>🫁 บอร์ดเกมตะลุยระบบหายใจ ป.6</h2>
    <p style="margin: 0 0 10px 0;">กดปุ่มทอยเต๋าเพื่อพาน้องเม็ดเลือดแดงเดินทางกัน!</p>

    <button class="btn" id="dice-btn" onclick="rollDice()">🎲 ทอยลูกเต๋า</button>
    <p id="dice-result" style="font-size: 18px; font-weight: bold; margin: 5px 0;"></p>

    <!-- หน้าตากระดานเกม -->
    <div class="board">
        <div class="cell active" id="cell-0">🏁 START</div>
        <div class="cell" id="cell-1">👃 จมูก</div>
        <div class="cell" id="cell-2">🧪 หลอดลม</div>
        <div class="cell" id="cell-3">🫁 ปอด</div>
        <div class="cell" id="cell-4">🫧 ถุงลมปอด</div>
        <div class="cell" id="cell-5">🏆 เส้นชัย</div>
    </div>

    <!-- กล่องคำถามสุขศึกษา -->
    <div class="quiz-card" id="quiz-card">
        <h3 id="quiz-title" style="color: #ff6b6b; margin-top: 0;">❓ คำถามประจำด่าน</h3>
        <p id="question" style="text-align: left;"></p>
        <div id="choices"></div>
        <div id="result"></div>
    </div>

    <script>
        let currentPos = 0;
        const totalCells = 6;
        const diceBtn = document.getElementById('dice-btn');
        const diceResult = document.getElementById('dice-result');
        const quizCard = document.getElementById('quiz-card');

        // คลังคำถามสุขศึกษาประจำด่านต่างๆ
        const quizzes = {
            1: {
                title: "ด่านที่ 1: จมูก (Nose)",
                q: "ขนจมูกและน้ำเมือกในจมูก มีประโยชน์ในระบบหายใจอย่างไร?",
                c: ["🧁 A. ช่วยให้อากาศบริสุทธิ์และดักจับฝุ่นละออง", "🍭 B. ช่วยให้จมูกมีความสวยงามกิ๊บเก๋"],
                ans: 0,
                feedback: "ถูกต้องจ้า! 🎉 ขนจมูกทำหน้าที่เหมือนเครื่องกรองอากาศธรรมชาติ คอยดักฝุ่นไม่ให้เข้าสู่ปอด"
            },
            2: {
                title: "ด่านที่ 2: หลอดลม (Trachea)",
                q: "หากเราไปยืนในบริเวณที่มีควันบุหรี่หนาแน่น จะส่งผลเสียต่อหลอดลมและปอดอย่างไร?",
                c: ["🍿 A. ทำให้หลอดลมแข็งแรง รับแก๊สได้ดีขึ้น", "🍭 B. ทำให้ระคายเคือง ไอ จาม และถุงลมปอดถูกทำลาย"],
                ans: 1,
                feedback: "เก่งมากคราบบบ! 💖 ควันบุหรี่มีสารพิษที่ทำให้หลอดลมอักเสบและทำให้ปอดดำได้"
            },
            3: {
                title: "ด่านที่ 3: ปอด (Lung)",
                q: "พฤติกรรมใดต่อไปนี้ ช่วยส่งเสริมให้ปอดของเราทำงานได้อย่างแข็งแรงที่สุด?",
                c: ["🧁 A. ออกกำลังกายสม่ำเสมอในที่อากาศบริสุทธิ์", "🍿 B. นอนเล่นเกมในห้องที่ปิดทึบและมีฝุ่นเยอะ"],
                ans: 0,
                feedback: "ถูกต้องที่สุด! 🌟 การออกกำลังกายช่วยให้กล้ามเนื้อระบบหายใจแข็งแรง ปอดขยายตัวได้ดี"
            },
            4: {
                title: "ด่านที่ 4: ถุงลมปอด (Alveoli)",
                q: "ฝุ่น PM 2.5 มีอันตรายต่อถุงลมปอดอย่างไร?",
                c: ["🍿 A. เข้าไปสะสมในถุงลมปอด ทำให้การแลกเปลี่ยนแก๊สแย่ลง", "🧁 B. ไม่มีอันตราย ร่างกายสามารถไอออกมาได้หมด"],
                ans: 0,
                feedback: "ถูกต้องครับ! 😷 PM 2.5 มีขนาดเล็กมากจนขนจมูกกรองไม่ได้ มันจะวิ่งไปอุดตันที่ถุงลมปอดโดยตรง"
            }
        };

        // สรรค์สร้างตัวเดินเริ่มต้น
        document.getElementById('cell-0').innerHTML += '<div class="player" id="player"></div>';

        function rollDice() {
            diceBtn.disabled = true;
            let steps = Math.floor(Math.random() * 2) + 1; // สุ่มเดิน 1-2 ช่อง เพื่อไม่ให้เกมจบไวเกินไป
            diceResult.innerText = `🎲 ทอยได้: ${steps} ช่อง`;
            
            // ย้ายตัวเดิน
            document.getElementById(`cell-${currentPos}`).classList.remove('active');
            currentPos += steps;
            
            if (currentPos >= totalCells - 1) {
                currentPos = totalCells - 1;
                document.getElementById(`cell-${currentPos}`).classList.add('active');
                document.getElementById(`cell-${currentPos}`).appendChild(document.getElementById('player'));
                diceResult.innerText = "🎉 ยินดีด้วย! คุณพาน้องออกซิเจนไปส่งถึงเส้นชัยอย่างปลอดภัย!";
                quizCard.style.display = "none";
                return;
            }

            document.getElementById(`cell-${currentPos}`).classList.add('active');
            document.getElementById(`cell-${currentPos}`).appendChild(document.getElementById('player'));

            // แสดงคำถามประจำช่อง
            showQuiz(currentPos);
        }

        function showQuiz(pos) {
            const quiz = quizzes[pos];
            if (!quiz) {
                diceBtn.disabled = false;
                return;
            }
            
            quizCard.style.display = "block";
            document.getElementById('quiz-title').innerText = quiz.title;
            document.getElementById('question').innerText = quiz.q;
            
            let choicesHtml = "";
            quiz.c.forEach((choice, index) => {
                choicesHtml += `<button class="choice-btn" onclick="checkAnswer(${index}, ${quiz.ans})">${choice}</button>`;
            });
            document.getElementById('choices').innerHTML = choicesHtml;
            document.getElementById('result').innerText = "";
        }

        function checkAnswer(selected, correct) {
            const resultDiv = document.getElementById('result');
            if (selected === correct) {
                resultDiv.style.color = "#2e7d32";
                resultDiv.innerText = quizzes[currentPos].feedback;
                // ตอบถูกให้ทอยต่อตาหน้าได้
                diceBtn.disabled = false;
            } else {
                resultDiv.style.color = "#c62828";
                resultDiv.innerText = "แง ยังไม่ถูกน้า ลองเลือกใหม่อีกทีจ้า! ❌";
            }
        }
    </script>
</body>
</html>
