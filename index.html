<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมตะลุยด่านผู้พิทักษ์ปอด - สุขศึกษา ป.6</title>
    
    <!-- ดึงฟอนต์ไอติม (Itim) สุดน่ารัก -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">

    <style>
        body, button, h2, h3, p, div {
            font-family: 'Itim', cursive !important;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #ffdee9 0%, #b5fffc 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 480px;
            padding: 25px;
            border-radius: 30px;
            border: 5px solid #ffb7b2;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 { color: #ff6b81; font-size: 28px; margin-top: 0; }
        p { color: #57606f; font-size: 19px; line-height: 1.5; }

        .score-badge {
            background: #ff7675;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 16px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .avatar {
            font-size: 70px;
            margin: 10px 0;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .btn-choice {
            background: #ffb7b2;
            color: #4a4a4a;
            border: none;
            padding: 14px 18px;
            margin: 8px 0;
            border-radius: 20px;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
            text-align: left;
            box-shadow: 0 4px 0 #e09d98;
            transition: all 0.1s ease;
            display: block;
        }
        .btn-choice:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #e09d98;
        }

        #result-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 15px;
            font-size: 17px;
            display: none;
            text-align: left;
        }

        .btn-next {
            background: #20bf6b;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 0 #10ac84;
        }
        .btn-next:active { transform: translateY(4px); box-shadow: 0 0px 0 #10ac84; }
    </style>
</head>
<body>

    <div class="game-card">
        <div id="game-zone">
            <div class="score-badge">ด่านที่ <span id="stage-num">1</span>/5 | คะแนน: <span id="score-text">0</span></div>
            <h2 id="stage-title">🫁 ภารกิจปกป้องปอด</h2>
            <div class="avatar" id="avatar-emoji">🫁✨</div>
            
            <p id="question-text">ข้อความคำถาม</p>

            <div id="choices-container">
                <!-- ปุ่มช้อยส์จะถูกเปลี่ยนด้วยคอมพิวเตอร์อัติโนมัติ -->
            </div>
            
            <div id="result-box"></div>
            <button class="btn-next" id="next-btn" style="display:none;" onclick="nextStage()">ลุยด่านต่อไป ➡️</button>
        </div>
        
        <!-- หน้าสรุปตอนจบเกม -->
        <div id="end-zone" style="display:none;">
            <h2>🎉 จบภารกิจผู้พิทักษ์ปอด!</h2>
            <div class="avatar">🏆👑</div>
            <p style="font-size: 22px;">นักเรียนได้คะแนนรวมทั้งหมด</p>
            <h1 style="font-size: 60px; color: #ff6b81; margin: 10px 0;"><span id="final-score">0</span> / 5</h1>
            <p id="evaluation-text">คำชม</p>
            <button class="btn-next" onclick="location.reload()">เล่นใหม่อีกครั้ง 🔄</button>
        </div>
    </div>

    <script>
        // คลังคำถาม 5 ข้อวิชาสุขศึกษา ป.6
        const quizData = [
            {
                question: "<b>ด่านที่ 1:</b> วันนี้ค่าฝุ่น PM 2.5 สูงมาก และมีคนนั่งสูบบุหรี่อยู่ใกล้ๆ นักเรียนควรทำอย่างไรดีที่สุดเพื่อเซฟระบบหายใจ?",
                choices: ["🧁 A. เดินเข้าไปบอกให้เขาเลิกสูบตรงนั้น", "🍭 B. ใส่หน้ากากอนามัยแล้วรีบเดินหนีไปที่อื่น", "🍿 C. ใช้มืออุดจมูกแล้วยืนอยู่ที่เดิม"],
                correct: 1,
                feedbackOK: "ถูกต้องที่สุดเลยจ้า! 🎉 การสวมหน้ากากอนามัยและเลี่ยงควันพิษ จะช่วยปกป้องถุงลมปอดไม่ให้ถูกทำลาย",
                feedbackNo: "ยังไม่ถูกน้า! ❌ เราต้องพาตัวเองออกจากบริเวณที่มีควันหรือฝุ่นพิษทันที มือเปล่ากรองสารพิษไม่ได้จ้า"
            },
            {
                question: "<b>ด่านที่ 2:</b> การเลือกออกกำลังกายแบบใดที่ส่งผลดีและช่วยเพิ่มความแข็งแรงให้กับปอดและกะบังลมได้ดีที่สุด?",
                choices: ["🍦 A. วิ่งจ๊อกกิ้ง หรือว่ายน้ำอย่างสม่ำเสมอ", "🍩 B. นั่งเล่นเกมส์แข่งความเร็วกับเพื่อน", "🍫 C. เดินช้อปปิ้งซื้อขนมในห้างสรรพสินค้า"],
                correct: 0,
                feedbackOK: "เก่งมาก! 🏃‍♂️ การออกกำลังกายแบบแอโรบิก (วิ่ง/ว่ายน้ำ) ช่วยเพิ่มความจุของปอดและทำให้กะบังลมแข็งแรงขึ้น",
                feedbackNo: "แง ยังไม่ใช่นะจ๊ะ! ❌ ต้องเป็นการออกกำลังกายที่ทำให้หัวใจเต้นแรงและปอดได้ฝึกหายใจเข้า-ออกอย่างต่อเนื่องจ้า"
            },
            {
                question: "<b>ด่านที่ 3:</b> อาการใดต่อไปนี้ เป็นสัญญาณเตือนว่าระบบหายใจของคุณเริ่มผิดปกติและควรไปพบแพทย์?",
                choices: ["🥞 A. รู้สึกง่วงนอนตอนบ่ายๆ", "🧋 B. หายใจเสียงดังฟี้ดๆ ไอเรื้อรัง และแน่นหน้าอก", "🍮 C. รู้สึกหิวข้าวก่อนเวลาอาหาร"],
                correct: 1,
                feedbackOK: "ใช่เลยครับ! 🩺 อาการไอเรื้อรัง แน่นหน้าอก หรือหายใจมีเสียง เป็นสัญญาณเตือนของโรคทางเดินหายใจ เช่น หอบหืด",
                feedbackNo: "ลืมดูหรือเปล่าเอ่ย? ❌ อาการง่วงหรือหิวเป็นเรื่องปกติของร่างกาย แต่อาการไอเรื้อรังและแน่นหน้าอกต่างหากที่เป็นอันตราย!"
            },
            {
                question: "<b>ด่านที่ 4:</b> ข้อใดเป็นการปฏิบัติตนที่ถูกต้องในการดูแลรักษาระบบหายใจตามหลักสุขบัญญัติ?",
                choices: ["🍡 A. พ่นน้ำหอมกลิ่นแรงๆ ไว้ในห้องนอนเพื่อความสดชื่น", "🍧 B. อยู่ในที่ที่อากาศบริสุทธิ์ ถ่ายเทสะดวก และไม่ใช้สิ่งของร่วมกับผู้ป่วยหวัด", "🍰 C. นำผ้าห่มไปตากแดดปีละ 1 ครั้งพอ"],
                correct: 1,
                feedbackOK: "ยอดเยี่ยมที่สุด! 🌟 การอยู่ในที่อากาศถ่ายเทและไม่คลุกคลีใกล้ชิดกับผู้ป่วย ช่วยลดโอกาสติดเชื้อระบบทางเดินหายใจ",
                feedbackNo: "ยังไม่ถูกจ้า! ❌ กลิ่นน้ำหอมฉุนๆ หรือผ้าห่มที่ฝุ่นเกาะ อาจระคายเคืองระบบหายใจและทำให้เป็นภูมิแพ้ได้นะ"
            },
            {
                question: "<b>ด่านที่ 5:</b> หากเพื่อนในกลุ่มมีอาการ 'อาหารติดคอ สลักอาหาร' จนหายใจไม่ออก หน้าเริ่มเขียว นักเรียนควรทำอย่างไร?",
                choices: ["🍭 A. เอาน้ำเย็นให้เพื่อนรีบดื่มตามเข้าไปเยอะๆ", "🍿 B. ให้เพื่อนยืนก้มหน้า แล้วใช้ฝ่ามือตบแรงๆ บริเวณกึ่งกลางหลัง (ระหว่างสะบัก)", "🧁 C. ปล่อยให้เพื่อนนั่งพักเฉยๆ เดี๋ยวมันก็หลุดเอง"],
                correct: 1,
                feedbackOK: "ถูกต้องปลอดภัย! 👏 การตบหลังแรงๆ (Back Blows) ช่วยสร้างแรงดันดันสิ่งแปลกปลอมออกจากทางเดินหายใจได้ทันที",
                feedbackNo: "อันตรายมากนะครู! ❌ ห้ามให้ดื่มน้ำเด็ดขาดเพราะจะยิ่งอุดกั้นทางเดินหายใจ และห้ามปล่อยทิ้งไว้เพราะอาจขาดอากาศหายใจถึงชีวิตได้"
            }
        ];

        let currentStage = 0;
        let score = 0;

        function loadStage() {
            document.getElementById('stage-num').innerText = currentStage + 1;
            document.getElementById('score-text').innerText = score;
            document.getElementById('question-text').innerHTML = quizData[currentStage].question;
            document.getElementById('result-box').style.display = "none";
            document.getElementById('next-btn').style.display = "none";
            document.getElementById('avatar-emoji').innerHTML = "🫁✨";

            const choicesContainer = document.getElementById('choices-container');
            choicesContainer.innerHTML = "";

            quizData[currentStage].choices.forEach((choice, index) => {
                const button = document.createElement('button');
                button.className = "btn-choice";
                button.innerHTML = choice;
                button.onclick = () => selectAnswer(index);
                choicesContainer.appendChild(button);
            });
        }

        function selectAnswer(selectedIndex) {
            const resultBox = document.getElementById('result-box');
            const nextBtn = document.getElementById('next-btn');
            const avatar = document.getElementById('avatar-emoji');
            
            // ปิดไม่ให้กดปุ่มช้อยส์ซ้ำหลังจากตอบแล้ว
            const buttons = document.querySelectorAll('.btn-choice');
            buttons.forEach(btn => btn.disabled = true);

            resultBox.style.display = "block";
            nextBtn.style.display = "inline-block";

            if (selectedIndex === quizData[currentStage].correct) {
                score++;
                document.getElementById('score-text').innerText = score;
                avatar.innerHTML = "🥰🎉";
                resultBox.style.background = "#e8f5e9";
                resultBox.style.color = "#2e7d32";
                resultBox.innerHTML = quizData[currentStage].feedbackOK;
            } else {
                avatar.innerHTML = "😱❌";
                resultBox.style.background = "#ffebee";
                resultBox.style.color = "#c62828";
                resultBox.innerHTML = quizData[currentStage].feedbackNo;
            }
        }

        function nextStage() {
            currentStage++;
            if (currentStage < quizData.length) {
                loadStage();
            } else {
                // จบเกม แสดงหน้าสรุป
                document.getElementById('game-zone').style.display = "none";
                document.getElementById('end-zone').style.display = "block";
                document.getElementById('final-score').innerText = score;
                
                const evalText = document.getElementById('evaluation-text');
                if (score === 5) {
                    evalText.innerHTML = "🌟 ยอดเยี่ยมที่สุดเลย! หนูคือ <b>'สุดยอดผู้พิทักษ์ปอด'</b> รอบรู้และดูแลตัวเองได้ดีเยี่ยม!";
                } else if (score >= 3) {
                    evalText.innerHTML = "👍 เก่งมากจ้า! หนูมีความรู้ในการดูแลระบบหายใจที่ดีเลย พยายามต่อไปนะคนเก่ง";
                } else {
                    evalText.innerHTML = "🥺 ไม่เป็นไรน้าา ลองกลับไปทบทวนบทเรียนสุขศึกษา แล้วมาท้าทายใหม่อีกรอบนะจ๊ะ ปอดเราเราต้องดูแล!";
                }
            }
        }

        // เริ่มเกมครั้งแรก
        loadStage();
    </script>

</body>
</html>
